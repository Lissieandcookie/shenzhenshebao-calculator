<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深圳社保缴纳计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px;
        }
        h1 {
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 13px;
            color: #999;
            margin-bottom: 24px;
        }
        .input-section {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }
        .input-group input {
            width: 200px;
            height: 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #4f7cff;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 40px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .checkbox-group label {
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }
        .btn {
            height: 40px;
            padding: 0 24px;
            background: #4f7cff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #3d6ae8;
        }
        .result-section {
            display: none;
        }
        .result-section.show {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }
        th {
            background: #f8f9fc;
            color: #666;
            font-weight: 500;
        }
        td {
            color: #333;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .total-row {
            background: #f0f4ff;
            font-weight: 600;
        }
        .total-row td {
            color: #4f7cff;
            font-size: 14px;
        }
        .summary {
            background: #f8f9fc;
            border-radius: 8px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 12px;
        }
        .summary-item {
            text-align: center;
        }
        .summary-item .label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }
        .summary-item .value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .summary-item .value.blue {
            color: #4f7cff;
        }
        .summary-item .value.orange {
            color: #ff8c00;
        }
        .summary-item .value.green {
            color: #34c759;
        }
        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            line-height: 1.8;
        }
        .note strong {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 深圳社保缴纳计算器</h1>
        <p class="subtitle">输入月薪酬，按公司缴纳比例计算社保缴费基数，自动生成各项社保缴纳明细（四舍五入到分）</p>

        <div class="input-section">
            <div class="input-group">
                <label>月薪酬基数（元）</label>
                <input type="number" id="salary" placeholder="请输入月薪酬" />
            </div>
            <div class="input-group">
                <label>公司缴纳基数比例（%）</label>
                <input type="number" id="companyRatio" value="75" style="width:100px;" />
            </div>
            <div class="input-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="isShenzhenResident" />
                    <label for="isShenzhenResident">深圳户籍</label>
                </div>
            </div>
            <button class="btn" onclick="calculate()">计算</button>
        </div>

        <div class="result-section" id="resultSection">
            <table>
                <thead>
                    <tr>
                        <th>险种</th>
                        <th>缴费基数</th>
                        <th>个人比例</th>
                        <th>个人缴纳</th>
                        <th>公司比例</th>
                        <th>公司缴纳</th>
                        <th>小计</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                </tbody>
            </table>

            <div class="summary">
                <div class="summary-item">
                    <div class="label">个人缴纳合计</div>
                    <div class="value blue" id="totalPersonal">-</div>
                </div>
                <div class="summary-item">
                    <div class="label">公司缴纳合计</div>
                    <div class="value orange" id="totalCompany">-</div>
                </div>
                <div class="summary-item">
                    <div class="label">社保缴纳总计</div>
                    <div class="value green" id="totalAll">-</div>
                </div>
            </div>

            <div class="note">
                <strong>说明：</strong><br/>
                1. 社保缴费基数 = 月薪酬 × 公司缴纳基数比例（当前默认75%）<br/>
                2. 养老保险（地补）仅深圳户籍员工缴纳，非深户不缴纳此项<br/>
                3. 工伤保险、生育保险个人不缴费，全部由公司承担<br/>
                4. 所有金额按四舍五入到分计算<br/>
                5. 数据仅供参考，实际以工资条为准
            </div>
        </div>
    </div>

    <script>
        // 社保规则配置（基于图片数据）
        const rules = [
            {
                name: '养老保险',
                personalMin: 4775,
                personalMax: 27549,
                companyMin: 4775,
                companyMax: 27549,
                personalRate: 0.08,
                companyRate: 0.16,
            },
            {
                name: '医疗保险',
                personalMin: 6727,
                personalMax: 33633,
                companyMin: 6727,
                companyMax: 33633,
                personalRate: 0.02,
                companyRate: 0.06,
            },
            {
                name: '失业保险',
                personalMin: 2520,
                personalMax: 44265,
                companyMin: 2520,
                companyMax: 44265,
                personalRate: 0.002,
                companyRate: 0.008,
            },
            {
                name: '工伤保险',
                personalMin: null,
                personalMax: null,
                companyMin: 2520,
                companyMax: null, // 图片中上限显示"请输入"，按无上限处理
                personalRate: 0,
                companyRate: 0.004,
            },
            {
                name: '生育保险',
                personalMin: null,
                personalMax: null,
                companyMin: 6727,
                companyMax: 33633,
                personalRate: 0,
                companyRate: 0.005,
            },
            {
                name: '养老保险（地补）',
                personalMin: 4775,
                personalMax: 27549,
                companyMin: 4775,
                companyMax: 27549,
                personalRate: 0,
                companyRate: 0.01,
                onlyShenzhenResident: true,
            },
        ];

        function clampBase(salary, min, max) {
            if (min === null) return null; // 个人不缴
            let base = salary;
            if (base < min) base = min;
            if (max !== null && base > max) base = max;
            return base;
        }

        function roundToFen(value) {
            return Math.round(value * 100) / 100;
        }

        function calculate() {
            const salary = parseFloat(document.getElementById('salary').value);
            const companyRatio = parseFloat(document.getElementById('companyRatio').value);
            const isShenzhenResident = document.getElementById('isShenzhenResident').checked;

            if (!salary || salary <= 0) {
                alert('请输入有效的月薪酬');
                return;
            }
            if (!companyRatio || companyRatio <= 0 || companyRatio > 100) {
                alert('请输入有效的公司缴纳比例（1-100）');
                return;
            }

            // 实际社保缴费基数 = 月薪酬 × 公司缴纳比例
            const actualBase = roundToFen(salary * companyRatio / 100);

            let totalPersonal = 0;
            let totalCompany = 0;
            let rows = '';

            rules.forEach(rule => {
                // 跳过非深户的地补
                if (rule.onlyShenzhenResident && !isShenzhenResident) return;

                // 计算个人缴费基数和金额
                let personalBase = clampBase(actualBase, rule.personalMin, rule.personalMax);
                let personalAmount = 0;
                if (personalBase !== null && rule.personalRate > 0) {
                    personalAmount = roundToFen(personalBase * rule.personalRate);
                }

                // 计算公司缴费基数和金额
                let companyBase = clampBase(actualBase, rule.companyMin, rule.companyMax);
                let companyAmount = 0;
                if (companyBase !== null) {
                    companyAmount = roundToFen(companyBase * rule.companyRate);
                }

                let subtotal = roundToFen(personalAmount + companyAmount);
                totalPersonal += personalAmount;
                totalCompany += companyAmount;

                let displayPersonalBase = personalBase !== null ? personalBase.toFixed(2) : '-';
                let displayCompanyBase = companyBase !== null ? companyBase.toFixed(2) : '-';
                let displayPersonalRate = rule.personalRate > 0 ? (rule.personalRate * 100).toFixed(1) + '%' : '-';
                let displayCompanyRate = (rule.companyRate * 100).toFixed(1) + '%';

                rows += `<tr>
                    <td>${rule.name}</td>
                    <td>${displayPersonalBase !== '-' ? displayPersonalBase : displayCompanyBase}</td>
                    <td>${displayPersonalRate}</td>
                    <td>${personalAmount > 0 ? personalAmount.toFixed(2) : '-'}</td>
                    <td>${displayCompanyRate}</td>
                    <td>${companyAmount.toFixed(2)}</td>
                    <td>${subtotal.toFixed(2)}</td>
                </tr>`;
            });

            totalPersonal = roundToFen(totalPersonal);
            totalCompany = roundToFen(totalCompany);
            let totalAll = roundToFen(totalPersonal + totalCompany);

            rows += `<tr class="total-row">
                <td>合计</td>
                <td>-</td>
                <td>-</td>
                <td>${totalPersonal.toFixed(2)}</td>
                <td>-</td>
                <td>${totalCompany.toFixed(2)}</td>
                <td>${totalAll.toFixed(2)}</td>
            </tr>`;

            document.getElementById('resultBody').innerHTML = rows;
            document.getElementById('totalPersonal').textContent = totalPersonal.toFixed(2) + ' 元';
            document.getElementById('totalCompany').textContent = totalCompany.toFixed(2) + ' 元';
            document.getElementById('totalAll').textContent = totalAll.toFixed(2) + ' 元';
            document.getElementById('resultSection').classList.add('show');
        }

        // 回车触发计算
        document.getElementById('salary').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculate();
        });
    </script>
</body>
</html>
